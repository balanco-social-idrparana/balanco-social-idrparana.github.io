name: Build e publica no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: form/package-lock.json

      # ─── form/ ──────────────────────────────────────────────────────
      - name: Instalar dependências (form)
        working-directory: form
        run: npm ci

      - name: Build form
        working-directory: form
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          BASE_URL: /form/
        run: npm run build

      # ─── Monta site estático ────────────────────────────────────────
      - name: Montar diretório do Pages
        run: |
          mkdir -p site/form
          cp -r form/dist/* site/form/
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta property="og:title" content="Balanço Social — IDR-Paraná 2025">
            <meta property="og:description" content="Relatório de impactos de ações e tecnologias do IDR-Paraná, segundo a metodologia Ambitec-Agro, para o Balanço Social 2025.">
            <meta property="og:url" content="https://balanco-social-idrparana.github.io/">
            <meta property="og:type" content="website">
            <meta property="og:locale" content="pt_BR">
            <title>Balanço Social — IDR-Paraná 2025</title>
            <style>
              :root { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: #1f2328; line-height: 1.55; }
              * { box-sizing: border-box; }
              body { margin: 0; background: #f6f8fa; }
              main { max-width: 760px; margin: 56px auto 80px; padding: 0 16px; }
              h1 { font-size: 1.7rem; margin: 0 0 6px; line-height: 1.2; }
              p.subtitulo { margin: 0 0 36px; color: #57606a; font-size: 1.05rem; }
              section { background: #fff; border: 1px solid #d0d7de; border-radius: 8px; padding: 22px 24px; margin-bottom: 18px; }
              section h2 { margin: 0 0 12px; font-size: 1.1rem; color: #2e6e3a; }
              section p { margin: 0 0 12px; }
              section p:last-child { margin-bottom: 0; }
              .acessos { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 24px; }
              a.card { display: block; padding: 18px; background: #fff; border: 1px solid #d0d7de; border-radius: 8px; text-decoration: none; color: #1f2328; transition: border-color .15s, background .15s; }
              a.card:hover { background: #f0f6f2; border-color: #2e6e3a; }
              a.card strong { display: block; margin-bottom: 4px; font-size: 1.05rem; color: #2e6e3a; }
              a.card span { font-size: 0.9rem; color: #57606a; }
              .rodape { margin-top: 28px; padding-top: 16px; border-top: 1px solid #d0d7de; font-size: 0.85rem; color: #57606a; }
            </style>
          </head>
          <body>
            <main>
              <h1>Balanço Social — IDR-Paraná 2025</h1>
              <p class="subtitulo">Relatório de impactos de ações e tecnologias do IDR-Paraná.</p>

              <section>
                <h2>O que é</h2>
                <p>
                  Este sistema reúne os <strong>relatórios de impacto</strong> das ações e
                  tecnologias desenvolvidas pelo Instituto de Desenvolvimento Rural do
                  Paraná (IDR-Paraná), para compor o <strong>Balanço Social 2025</strong>.
                  Cada relatório descreve uma ação ou tecnologia e avalia seus impactos
                  econômicos, sociais e ambientais.
                </p>
                <p>
                  A avaliação de impactos segue a metodologia <strong>Ambitec-Agro</strong>,
                  na qual cada coeficiente é pontuado em uma escala
                  (<em>-3, -1, 0, +1, +3</em> ou "Não se aplica"). O preenchimento é
                  interno, feito pelas equipes responsáveis por cada ação ou tecnologia.
                </p>
              </section>

              <div class="acessos">
                <a class="card" href="./form/">
                  <strong>Preencher relatório de impactos →</strong>
                  <span>Formulário interno do IDR-Paraná para o Balanço Social 2025.</span>
                </a>
              </div>

              <div class="rodape">
                IDR-Paraná — Instituto de Desenvolvimento Rural do Paraná.
              </div>
            </main>
          </body></html>
          EOF

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
