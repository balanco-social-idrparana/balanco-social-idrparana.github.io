name: Build e publica no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: form/package-lock.json

      # ─── form/ ──────────────────────────────────────────────────────
      - name: Instalar dependências (form)
        working-directory: form
        run: npm ci

      - name: Build form
        working-directory: form
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          BASE_URL: /form/
        run: npm run build

      # ─── Monta site estático ────────────────────────────────────────
      - name: Montar diretório do Pages
        run: |
          mkdir -p site/form
          cp -r form/dist/* site/form/
          cp -r landing/* site/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
