name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: form/package-lock.json

      - name: Instalar dependências (form)
        working-directory: form
        run: npm ci

      - name: Build (typecheck + vite)
        working-directory: form
        env:
          # Valores fictícios: o CI valida compilação, não o deploy (o build
          # real com secrets acontece em pages.yml).
          VITE_API_URL: https://example.invalid/exec
          VITE_RECAPTCHA_SITE_KEY: ci-placeholder
        run: npm run build

      - name: Testes do formulário
        working-directory: form
        run: npm test

      - name: Testes do backend (Apps Script via harness Node)
        run: node --test "apps-script/tests/**/*.test.js"

      - name: Auditoria de dependências
        working-directory: form
        run: npm audit --omit=dev --audit-level=high
